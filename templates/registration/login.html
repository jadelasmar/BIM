<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BIM Nexus Login</title>
    <style>
        :root {
            --orange: #f97316;
            --black: #111827;
            --border: #d9e2ec;
            --muted: #52606d;
            --page: #f5f7fa;
            --surface: #ffffff;
        }

        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            place-items: center;
            color: var(--black);
            background: var(--page);
            font-family: Arial, sans-serif;
        }

        main {
            width: min(420px, calc(100% - 32px));
            padding: 28px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
        }

        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: 700;
        }

        input {
            box-sizing: border-box;
            width: 100%;
            min-height: 42px;
            padding: 10px 12px;
            border: 1px solid #bcccdc;
            border-radius: 6px;
            font: inherit;
        }

        button {
            width: 100%;
            min-height: 44px;
            margin-top: 20px;
            border: 0;
            border-radius: 6px;
            color: #ffffff;
            background: var(--orange);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .error {
            padding: 10px 12px;
            border: 1px solid #feb2b2;
            border-radius: 6px;
            color: #9b2c2c;
            background: #fff5f5;
        }
    </style>
</head>
<body>
    <main>
        <h1>BIM Nexus Login</h1>
        <p>Use your Django account to access the internal IT operations platform.</p>
        {% if form.errors %}
            <p class="error">Invalid username or password.</p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {{ form.username.label_tag }}
            {{ form.username }}
            {{ form.password.label_tag }}
            {{ form.password }}
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit">Log in</button>
        </form>
    </main>
</body>
</html>
