{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BIM Nexus Command Center</title>
    <script src="{% static 'bim/theme-init.js' %}"></script>
    <link rel="stylesheet" href="{% static 'bim/theme.css' %}">
</head>
<body>
    <div id="bim-nexus-root"></div>
    {{ initial_data|json_script:"bim-nexus-initial-data" }}

    {% if vite_dev_server %}
        <script type="module" src="{{ vite_dev_server }}/@vite/client"></script>
        <script type="module" src="{{ vite_dev_server }}/src/main.jsx"></script>
    {% else %}
        <link rel="stylesheet" href="{% static 'frontend/assets/main.css' %}">
        <script type="module" src="{% static 'frontend/assets/index.js' %}"></script>
    {% endif %}
    <script src="{% static 'bim/theme.js' %}"></script>
</body>
</html>
